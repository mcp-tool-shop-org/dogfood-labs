schema_version: "1.0.0"
finding_id: dfind-ai-loadout-build-output-mismatch
title: TypeScript CLI scenarios must exercise built artifacts not source files
status: accepted
repo: mcp-tool-shop-org/ai-loadout
product_surface: cli
execution_mode: bot
journey_stage: first_run
issue_kind: build_output_mismatch
root_cause_kind: build_config_error
remediation_kind: build_config_fix
transfer_scope: surface_archetype
summary: >
  ai-loadout's dogfood scenario invoked src/cli.ts directly instead of the
  built dist/cli.js. The CI workflow did not run the build step before the
  scenario. This meant the scenario was exercising TypeScript source that
  users never see, not the actual published artifact. The fix was to ensure
  the workflow builds first and the scenario calls the dist entrypoint.
doctrine_statement: >
  Scenarios must exercise the built artifact, not source files. TypeScript
  repos compile to dist/ or build/. The CI workflow must run the build step
  before the scenario, and the scenario must call the built entrypoint.
notes: >
  This pattern was also observed in guardian and crawler. It applies to all
  TypeScript repos regardless of surface type.
source_record_ids:
