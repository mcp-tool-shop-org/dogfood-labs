    note: Corrected record after build output fix.
  - evidence_kind: doc
    doc_ref: docs/rollout-doctrine.md
    note: Build output truth doctrine rule extracted from this finding.
fix_refs:
  - ref_kind: workflow_change
    ref: .github/workflows/dogfood.yml
    note: Added npm run build step before scenario execution.
  - ref_kind: scenario_change
    ref: dogfood/scenarios/cli-resolve-and-list.yaml
    note: Changed entrypoint from src/cli.ts to dist/cli.js.
