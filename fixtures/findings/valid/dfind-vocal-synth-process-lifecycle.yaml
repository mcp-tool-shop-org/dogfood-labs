fix_refs:
  - ref_kind: workflow_change
    ref: .github/workflows/dogfood.yml
    note: Consolidated server start + scenario steps into single run block with set +e.
  - ref_kind: scenario_change
    ref: dogfood/scenarios/api-health-check.yaml
    note: Fixed port from 3000 to 4321 and route from / to /api/health.
