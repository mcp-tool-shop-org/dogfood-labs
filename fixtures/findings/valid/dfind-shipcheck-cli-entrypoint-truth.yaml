schema_version: "1.0.0"
finding_id: dfind-shipcheck-cli-entrypoint-truth
title: CLI entrypoint flags must match actual argparse contract before writing scenarios
status: accepted
repo: mcp-tool-shop-org/shipcheck
product_surface: cli
execution_mode: bot
journey_stage: first_run
issue_kind: entrypoint_truth
root_cause_kind: docs_code_drift
remediation_kind: scenario_change
transfer_scope: surface_archetype
summary: >
  Shipcheck's dogfood scenario used assumed CLI flags that did not match the
  actual argparse contract. The scenario passed --store as a flag, but the real
  CLI uses a positional argument for the init subcommand. This caused exit code 2
  (argparse error) which the verifier correctly recorded as a fail.
doctrine_statement: >
  Read --help or the CLI source before writing any scenario. A wrong flag
  produces exit code 2, which is an honest fail — not a scenario authoring
  problem to paper over.
notes: >
  This pattern repeated across multiple CLI repos (code-batch, zip-meta-map).
  The fix is always the same: verify the real entrypoint contract before
  authoring scenario steps.
