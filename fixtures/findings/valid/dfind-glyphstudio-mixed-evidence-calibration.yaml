schema_version: "1.0.0"
finding_id: dfind-glyphstudio-mixed-evidence-calibration
title: Desktop mixed-mode evidence requirements should reflect natural outputs
status: accepted
repo: mcp-tool-shop-org/glyphstudio
product_surface: desktop
execution_mode: mixed
journey_stage: verification
issue_kind: evidence_overconstraint
root_cause_kind: policy_overconstraint
remediation_kind: evidence_requirement_change
transfer_scope: surface_archetype
summary: >
  GlyphStudio's desktop surface initially required screenshot and artifact
  evidence, but the natural output of a Tauri desktop dogfood exercise is a
  transcript and log. Forcing screenshot evidence taught the repo to manufacture
  compliance artifacts rather than demonstrate reality. Policy was calibrated
  to accept transcript + log as sufficient evidence for mixed-mode desktop
  exercises.
doctrine_statement: >
  Evidence requirements should reflect natural outputs, not forced artifacts.
  Forced evidence is worse than no evidence — it teaches repos to manufacture
  compliance rather than demonstrate reality.
notes: >
  This applies to all desktop repos with mixed-mode execution. Bot-only desktop
  scenarios may have different natural evidence shapes.
source_record_ids:
