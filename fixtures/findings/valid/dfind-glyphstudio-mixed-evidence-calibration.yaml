    record_id: glyphstudio-23325766223-1
    note: Accepted record after evidence requirements were calibrated.
  - evidence_kind: policy
    policy_ref: policies/repos/mcp-tool-shop-org/glyphstudio.yaml
    note: Policy was updated to require transcript + log instead of screenshot + artifact.
  - evidence_kind: doc
    doc_ref: docs/rollout-doctrine.md
    note: Evidence truth doctrine rule extracted from this finding.
fix_refs:
