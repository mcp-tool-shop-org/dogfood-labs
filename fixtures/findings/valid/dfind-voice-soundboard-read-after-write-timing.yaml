schema_version: "1.0.0"
finding_id: dfind-voice-soundboard-read-after-write-timing
title: Gate F reads via CDN cache that lags 3-5 minutes behind git truth
status: reviewed
repo: mcp-tool-shop-org/voice-soundboard
product_surface: library
execution_mode: bot
journey_stage: rollout
issue_kind: read_after_write_timing
root_cause_kind: timing_race
remediation_kind: docs_change
transfer_scope: org_wide
summary: >
  After fresh ingestion, dogfood-labs indexes are updated immediately in git.
  However, Gate F fetches via raw.githubusercontent.com which has a CDN cache
  of 3-5 minutes. voice-soundboard and zip-meta-map both showed fail in Gate F
  for approximately 3 minutes after their corrected runs were ingested and
  verified as pass in git. This is an operational timing seam, not a product
  failure.
doctrine_statement: >
  Gate F reads via the GitHub raw content CDN, which may serve stale data
  for up to 5 minutes after ingestion. Do not fix this with cache-busting
  or API switching. The CDN behavior is correct and expected.
notes: >
  Operators should expect fresh ingestion to show pass in git immediately
  but Gate F may show previous state for 3-5 minutes. This resolves without
  intervention. No retry or fix needed.
