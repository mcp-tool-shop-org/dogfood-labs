repo: mcp-tool-shop-org/dogfood-labs
policy_version: "1.0.0"

enforcement:
  mode: required

surfaces:
  cli:
    required_scenarios:
      - record-ingest-roundtrip
    freshness:
      max_age_days: 14
      warn_age_days: 7
    execution_mode_policy:
      allowed: [bot]
    ci_requirements:
      coverage_min: null
      tests_must_pass: true
    evidence_requirements:
      required_kinds: [log]
      min_evidence_count: 1
