repo: mcp-tool-shop-org/claude-guardian
policy_version: "1.0.0"

enforcement:
  mode: required

surfaces:
  mcp-server:
    required_scenarios:
      - status-preflight-roundtrip
    freshness:
      max_age_days: 30
      warn_age_days: 14
    execution_mode_policy:
      allowed: [bot]
    ci_requirements:
      coverage_min: null
      tests_must_pass: true
    evidence_requirements:
      required_kinds: [log]
      min_evidence_count: 1
