name: CI

on:
  push:
    paths:
      - 'tools/**'
      - 'schemas/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install verify deps
        working-directory: tools/verify
        run: npm ci

      - name: Install ingest deps
        working-directory: tools/ingest
        run: npm ci

      - name: Test verify
        working-directory: tools/verify
        run: node --test

      - name: Test ingest
        working-directory: tools/ingest
        run: node --test

      - name: Test report
        working-directory: tools/report
        run: node --test report.test.js

      - name: Test portfolio
        working-directory: tools/portfolio
        run: node --test generate.test.js
