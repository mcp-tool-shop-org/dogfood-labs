name: Ingest dogfood submission

on:
  repository_dispatch:
    types: [dogfood_submission]
  workflow_dispatch:
    inputs:
      submission_file:
        description: "Path to submission JSON file (relative to repo root)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-ingest
  cancel-in-progress: false  # Never cancel an in-progress ingestion

permissions:
  contents: write  # Needed to commit records and indexes

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dogfood-labs
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install verifier dependencies
        run: cd tools/verify && npm ci

      - name: Install ingest dependencies
        run: cd tools/ingest && npm ci

      - name: Run ingestion (repository_dispatch)
        if: github.event_name == 'repository_dispatch'
        id: ingest_dispatch
        env:
          SUBMISSION_PAYLOAD: ${{ toJson(github.event.client_payload.submission) }}
        run: |
          echo "$SUBMISSION_PAYLOAD" | node tools/ingest/run.js | tee /tmp/ingest-result.json
          STATUS=$(jq -r '.status' /tmp/ingest-result.json)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "result=$(cat /tmp/ingest-result.json)" >> "$GITHUB_OUTPUT"

      - name: Run ingestion (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: ingest_manual
        run: |
          node tools/ingest/run.js --file "${{ inputs.submission_file }}" | tee /tmp/ingest-result.json
          STATUS=$(jq -r '.status' /tmp/ingest-result.json)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "result=$(cat /tmp/ingest-result.json)" >> "$GITHUB_OUTPUT"

      - name: Determine result
        id: result
        run: |
          if [ -f /tmp/ingest-result.json ]; then
            STATUS=$(jq -r '.status' /tmp/ingest-result.json)
            RUN_ID=$(jq -r '.run_id' /tmp/ingest-result.json)
            WRITTEN=$(jq -r '.written' /tmp/ingest-result.json)
            echo "status=$STATUS" >> "$GITHUB_OUTPUT"
            echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
            echo "written=$WRITTEN" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit records and indexes
        if: steps.result.outputs.written == 'true'
        run: |
          git config user.name "dogfood-bot"
          git config user.email "64996768+mcp-tool-shop@users.noreply.github.com"
          git add records/ indexes/
          RUN_ID="${{ steps.result.outputs.run_id }}"
          STATUS="${{ steps.result.outputs.status }}"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ingest: ${STATUS} dogfood record ${RUN_ID}"
          git push

      - name: Summary
        run: |
          if [ -f /tmp/ingest-result.json ]; then
            echo "### Dogfood Ingestion Result" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/ingest-result.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
